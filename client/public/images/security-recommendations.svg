<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cybersecurity Recommendations Dashboard</title>
  <desc id="desc">A stylized security operations dashboard with analytics charts, AI network nodes, and a protected data lock icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a33" />
      <stop offset="100%" stop-color="#15355f" />
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29d3ff" />
      <stop offset="100%" stop-color="#66ffe3" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g opacity="0.15" stroke="#6bb8ff" stroke-width="1">
    <path d="M0 140h1600M0 240h1600M0 340h1600M0 440h1600M0 540h1600M0 640h1600M0 740h1600" />
    <path d="M160 0v900M320 0v900M480 0v900M640 0v900M800 0v900M960 0v900M1120 0v900M1280 0v900M1440 0v900" />
  </g>

